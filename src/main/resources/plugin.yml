name: BattleChambers
version: '1.0.0'
main: com.battlechambers.BattleChambers
author: BattleChambers Team
description: A comprehensive mini-game server plugin for Minecraft

commands:
  bc:
    description: Main BattleChambers command
    usage: /bc <help|arena|game|join|leave|stats|top>
    aliases:
      - battlechambers
      - battles

permissions:
  battlechambers.use:
    description: Allows player to use BattleChambers commands
    default: true
  battlechambers.admin:
    description: Allows admin to manage arenas and games
    default: op
  battlechambers.create.arena:
    description: Allows player to create arenas
    default: op
  battlechambers.create.game:
    description: Allows player to create games
    default: op
